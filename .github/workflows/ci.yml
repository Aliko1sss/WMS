name: CI
on: [push, pull_request]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - name: Проверка стиля
        run: ruff check . && ruff format --check .
      - name: Запуск тестов
        run: pytest tests/ -v